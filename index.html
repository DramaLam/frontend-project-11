<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>frontend-project-11</title>
    <link href="https://fonts.googleapis.com/css2?family=Raleway:wght@300&display=swap" rel="stylesheet"/>
    <script type="module" src="/src/main.js"></script>
  </head>
  <body class="page d-flex flex-column min-vh-100">

  <!-- Главный контент -->
    <main class="flex-grow-1">

      <!-- Секция с заголовком и формой -->
      <section class="container-fluid bg-dark p-5">
        <div class="row">
          <div class="col-md-10 col-lg-8 mx-auto text-white">
            <h1 class="display-3 mb-0">RSS агрегатор</h1>
            <p class="lead">Начните читать RSS сегодня! Это легко, это красиво.</p>

            <form class="rss-form" action="#">
              <div class="row">
                <div class="col">
                  <div class="form-floating">
                    <input
                      id="add-rss"
                      type="url"
                      autofocus
                      required
                      autocomplete="url"
                      class="form-control w-100"
                      aria-label="Ссылка RSS"
                      name="add-rss"
                      placeholder="Ссылка RSS"
                    />
                    <label for="add-rss" style="color: grey">Ссылка RSS</label>
                  </div>
                </div>
                <div class="col-auto">
                  <button
                    class="btn btn-primary h-100 btn-lg px-sm-5"
                    type="submit"
                    aria-label="add"
                  >
                    Добавить
                  </button>
                </div>
              </div>
            </form>

            <p class="text-secondary my-2">Пример: https://dev.to/feed</p>
            <p class="message-container m-0" id="messageContainer"></p>
          </div>
        </div>
      </section>
    </main>
  </body>
</html>
