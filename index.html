<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>frontend-project-11</title>
    <link href="https://fonts.googleapis.com/css2?family=Raleway:wght@300&display=swap" rel="stylesheet"/>
    <script type="module" src="/src/main.js"></script>
  </head>
  <body class="page d-flex flex-column min-vh-100">

  <!-- Главный контент -->
    <main class="flex-grow-1">

      <!-- Секция с заголовком и формой -->
      <section class="container-fluid bg-dark p-5">
        <div class="row container-xl">
          <div class="col-md-10 col-lg-8 mx-auto text-white">
            <h1 class="display-3 mb-0">RSS агрегатор</h1>
            <p class="lead">Начните читать RSS сегодня! Это легко, это красиво.</p>

            <form class="rss-form" action="#" novalidate>
              <div class="row">
                <div class="col">
                  <div class="form-floating">
                    <input
                      id="add-rss"
                      type="url"
                      autofocus
                      required
                      autocomplete="url"
                      class="form-control w-100"
                      aria-label="url"
                      name="add-rss"
                      placeholder="Ссылка RSS"
                    />
                    <label for="add-rss" style="color: grey">Ссылка RSS</label>
                  </div>
                </div>
                <div class="col-auto">
                  <button
                    class="btn btn-primary h-100 btn-lg px-sm-5"
                    type="submit"
                    aria-label="add"
                  >
                    Добавить
                  </button>
                </div>
              </div>
            </form>

            <p class="text-secondary my-2">Пример: https://lorem-rss.hexlet.app/feed</p>
            <p class="message-container m-0" id="messageContainer"></p>
          </div>
        </div>
      </section>

      <!-- Секция с постами и фидами -->
      <section class="container-fluid p-5">
        <div class="row">
          <div class="col-8" data-type="posts">
            <div class="card border-0">
              <div class="card-body">
                <h2 class="card-title">Посты</h2>
              </div>
            </div>
          </div>

          <div class="col-4">
            <div class="card border-0" data-type="feeds">
              <div class="card-body">
                <h2 class="card-title">Фиды</h2>
              </div>
            </div>
          </div>
        </div>

        <!-- Модальное окно -->
        <div class="modal fade" id="postModal" tabindex="-1">
          <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
              <div class="modal-header">
                <h5 class="modal-title" id="postModalTitle"></h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
              </div>
              <div class="modal-body" id="postModalBody"></div>
              <div class="modal-footer">
                <a href="#" id="postModalLink" class="btn btn-primary" target="_blank">Читать полностью</a>
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Закрыть</button>
              </div>
            </div>
          </div>
        </div>

      </section>
    </main>

    <!-- Секция футера -->
    <footer class="border-top py-3 mt-auto bg-light">
      <div class="container-fluid text-center">
        created by <a href="https://github.com/DramaLam/frontend-project-11">DramaLam</a>
      </div>
    </footer>
  </body>
</html>
