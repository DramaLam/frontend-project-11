name: Node CI

on:
  - push
  - pull_request

env:
  CI: true

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [20.x]

    steps:
      - uses: actions/checkout@v4
      
      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
      
      - name: Install dependencies
        run: npm ci --include=dev
      
      - name: Debug ESLint
        run: npm list eslint --depth=0
      
      - name: Run linter (with debug)
        run: |
          npm run lint || {
            echo "========================================="
            echo "ESLint failed with exit code: $?"
            echo "========================================="
            echo "Checking if eslint is installed..."
            npx eslint --version || echo "ESLint not found!"
            echo "========================================="
            echo "Contents of node_modules/.bin:"
            ls -la node_modules/.bin/ || echo "node_modules/.bin not found!"
            exit 1
          }
      
      - name: Run tests
        run: make test